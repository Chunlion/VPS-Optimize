name: Shell Syntax

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Bash syntax
        run: |
          bash -n vps.sh
          bash -n dog.sh
