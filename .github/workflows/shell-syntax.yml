name: Shell Syntax Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  shell-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check Bash syntax
        run: |
          bash -n vps.sh
          bash -n dog.sh
          bash -n xui-custom-manager.sh

      - name: Run ShellCheck advisory
        run: |
          shellcheck vps.sh dog.sh xui-custom-manager.sh || true

      - name: Run smoke tests
        run: |
          bash tests/smoke.sh
